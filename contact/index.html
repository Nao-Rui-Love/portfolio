<main>

<h2>Contact</h2>

<p class="message">
ご質問・ご相談などございましたら、<br>
下記フォームよりお気軽にお問い合わせください。
</p>


<form class="contact-form" id="contactForm">


<label for="name">
お名前
</label>

<input
type="text"
id="name"
name="name"
placeholder="お名前を入力してください">


<label for="email">
メールアドレス
</label>

<input
type="email"
id="email"
name="email"
placeholder="example@email.com">


<label for="message">
お問い合わせ内容
</label>

<textarea
id="message"
name="message"
rows="8"
placeholder="内容をご入力ください"></textarea>


<button type="submit">
送信する
</button>


<p id="result"></p>


</form>
